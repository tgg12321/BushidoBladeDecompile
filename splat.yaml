name: Bushido Blade 2 (USA) (SLUS-00663)
sha1: 62efab4f73f992798c43e8c730aa43baa10bb4fa
options:
  basename: bb2
  target_path: disc/SLUS_006.63
  elf_path: build/bb2.elf
  base_path: .
  platform: psx
  compiler: PSYQ

  asm_path: asm
  src_path: src
  build_path: build
  create_asm_dependencies: True

  ld_script_path: bb2.ld
  ld_dependencies: True

  find_file_boundaries: True
  gp_value: 0x800A30CC

  o_as_suffix: True
  use_legacy_include_asm: False

  section_order: [".rodata", ".text", ".data", ".bss"]
  auto_link_sections: [".data", ".rodata", ".bss"]

  symbol_addrs_path:
    - symbol_addrs.txt
  reloc_addrs_path:
    - reloc_addrs.txt

  undefined_funcs_auto_path: undefined_funcs_auto.txt
  undefined_syms_auto_path: undefined_syms_auto.txt

  extensions_path: tools/splat_ext

  subalign: 2

  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

segments:
  - name: header
    type: header
    start: 0x0

  - name: main
    type: code
    start: 0x800
    vram: 0x80010000
    subsegments:
      - [0x800, rodata]   # .rodata section (strings, constants)
      - [0x6CAC, asm]     # .text section (code)
      - [0x7D920, data]   # .data section (initialized data)

  - [0x94000]
