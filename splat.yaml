# ============================================================================
# DO NOT RUN `make setup` BLINDLY — IT REGENERATES bb2.ld AND WOULD UNDO THE
# RODATA-CLEANUP WORK (rodata-cleanup project, 2026-06-09, see
# docs/rodata-cleanup-project.md + memory/project/rodata-cleanup-progress.md).
#
# bb2.ld is currently HAND-MAINTAINED — all 12 asm/data rodata blocks have
# been retired and their bytes re-attributed to C source files (existing .c
# or new src/*_rodata.c / src/*_pad.c / src/*_strings.c / src/*_filepaths.c
# sub-TUs). Regenerating bb2.ld via splat would:
#   1. Re-add `build/asm/data/*.rodata*.o(.rodata)` entries (the asm/data
#      .s files are gone, so those would be link errors).
#   2. Conflict with the const declarations now living in src/*.c (multiple
#      definition errors for D_<addr> and jtbl_<addr> symbols).
#
# If you need to regenerate splat output for other reasons (e.g. asm/funcs
# changed), do it WITHOUT clobbering bb2.ld:
#   - Back up bb2.ld first.
#   - Run splat (or run with a temporary ld_script_path so the real bb2.ld
#     stays put).
#   - Restore bb2.ld.
#   - Diff the splat-emitted ld script against the saved one to confirm no
#     new asm/data rodata segments appeared (if they did, the source has
#     drifted and the sub-TU files need re-examination).
#
# Tools available for inspection:
#   tools/audit_rodata_blocks.py    — should report 0 linked blocks
#   tools/cluster_rodata.py         — should emit 0 clusters
#   tools/re_attribute_rodata.py layout  — should show no asm/data rodata
# ============================================================================
name: Bushido Blade 2 (USA) (SLUS-00663)
sha1: 62efab4f73f992798c43e8c730aa43baa10bb4fa
options:
  basename: bb2
  target_path: disc/SLUS_006.63
  elf_path: build/bb2.elf
  base_path: .
  platform: psx
  compiler: PSYQ

  asm_path: asm
  src_path: src
  build_path: build
  create_asm_dependencies: True

  ld_script_path: bb2.ld
  ld_dependencies: True

  find_file_boundaries: True
  gp_value: 0x800A30CC

  o_as_suffix: True
  use_legacy_include_asm: False

  section_order: [".rodata", ".text", ".data", ".bss"]
  auto_link_sections: [".data", ".rodata", ".bss"]

  symbol_addrs_path:
    - symbol_addrs.txt
  reloc_addrs_path:
    - reloc_addrs.txt

  undefined_funcs_auto_path: undefined_funcs_auto.txt
  undefined_syms_auto_path: undefined_syms_auto.txt

  extensions_path: tools/splat_ext

  subalign: 2

  string_encoding: ASCII
  data_string_encoding: ASCII
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2

segments:
  - name: header
    type: header
    start: 0x0

  - name: main
    type: code
    start: 0x800
    vram: 0x80010000
    subsegments:
      - [0x800, rodata]   # .rodata section (strings, constants)
      - [0x6CAC, asm]     # .text section (code)
      - [0x7D920, data]   # .data section (initialized data)

  - [0x94000]
